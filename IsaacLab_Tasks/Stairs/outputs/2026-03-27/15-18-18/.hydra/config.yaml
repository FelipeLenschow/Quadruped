env:
  viewer:
    eye:
    - 7.5
    - 7.5
    - 7.5
    lookat:
    - 0.0
    - 0.0
    - 0.0
    cam_prim_path: /OmniverseKit_Persp
    resolution:
    - 1280
    - 720
    origin_type: world
    env_index: 0
    asset_name: null
    body_name: null
  sim:
    physics_prim_path: /physicsScene
    device: cuda:0
    dt: 0.005
    render_interval: 4
    gravity:
    - 0.0
    - 0.0
    - -9.81
    enable_scene_query_support: false
    use_fabric: true
    physx:
      solver_type: 1
      solve_articulation_contact_last: false
      min_position_iteration_count: 1
      max_position_iteration_count: 255
      min_velocity_iteration_count: 0
      max_velocity_iteration_count: 255
      enable_ccd: false
      enable_stabilization: false
      enable_external_forces_every_iteration: false
      enable_enhanced_determinism: false
      bounce_threshold_velocity: 0.5
      friction_offset_threshold: 0.04
      friction_correlation_distance: 0.025
      gpu_max_rigid_contact_count: 2097152
      gpu_max_rigid_patch_count: 262144
      gpu_found_lost_pairs_capacity: 1048576
      gpu_found_lost_aggregate_pairs_capacity: 32768
      gpu_total_aggregate_pairs_capacity: 32768
      gpu_collision_stack_size: 67108864
      gpu_heap_capacity: 67108864
      gpu_temp_buffer_capacity: 16777216
      gpu_max_num_partitions: 8
      gpu_max_soft_body_contacts: 32768
      gpu_max_particle_contacts: 32768
    physics_material:
      func: isaaclab.sim.spawners.materials.physics_materials:spawn_rigid_body_material
      static_friction: 0.5
      dynamic_friction: 0.5
      restitution: 0.0
      friction_combine_mode: average
      restitution_combine_mode: average
      compliant_contact_stiffness: 0.0
      compliant_contact_damping: 0.0
    render:
      enable_translucency: null
      enable_reflections: null
      enable_global_illumination: null
      antialiasing_mode: null
      enable_dlssg: null
      enable_dl_denoiser: null
      dlss_mode: null
      enable_direct_lighting: null
      samples_per_pixel: null
      enable_shadows: null
      enable_ambient_occlusion: null
      dome_light_upper_lower_strategy: null
      carb_settings: null
      rendering_mode: null
    create_stage_in_memory: false
    logging_level: WARNING
    save_logs_to_file: true
    log_dir: null
  ui_window_class_type: isaaclab.envs.ui.base_env_window:BaseEnvWindow
  seed: null
  decimation: 4
  is_finite_horizon: false
  episode_length_s: 20.0
  scene:
    num_envs: 2000
    env_spacing: 2.5
    lazy_sensor_update: true
    replicate_physics: false
    filter_collisions: true
    clone_in_fabric: false
    terrain:
      class_type: isaaclab.terrains.terrain_importer:TerrainImporter
      collision_group: -1
      prim_path: /World/ground
      num_envs: 1
      terrain_type: generator
      terrain_generator:
        class_type: isaaclab.terrains.terrain_generator:TerrainGenerator
        seed: null
        curriculum: false
        size:
        - 4.0
        - 4.0
        border_width: 0.0
        border_height: 1.0
        num_rows: 2
        num_cols: 3
        color_scheme: none
        horizontal_scale: 0.1
        vertical_scale: 0.005
        slope_threshold: 0.75
        sub_terrains:
          pyramid_stairs:
            function: isaaclab.terrains.trimesh.mesh_terrains:pyramid_stairs_terrain
            proportion: 0.166
            size:
            - 10.0
            - 10.0
            flat_patch_sampling: null
            border_width: 0.0
            step_height_range:
            - 0.05
            - 0.1
            step_width: 0.3
            platform_width: 0.1
            holes: false
          boxes:
            function: isaaclab.terrains.trimesh.mesh_terrains:random_grid_terrain
            proportion: 0.166
            size:
            - 10.0
            - 10.0
            flat_patch_sampling: null
            grid_width: 0.45
            grid_height_range:
            - 0.05
            - 0.1
            platform_width: 0.1
            holes: false
          random_rough:
            function: isaaclab.terrains.height_field.hf_terrains:random_uniform_terrain
            proportion: 0.166
            size:
            - 10.0
            - 10.0
            flat_patch_sampling: null
            border_width: 0.0
            horizontal_scale: 0.1
            vertical_scale: 0.005
            slope_threshold: null
            noise_range:
            - 0.01
            - 0.06
            noise_step: 0.01
            downsampled_scale: null
          hf_pyramid_slope:
            function: isaaclab.terrains.height_field.hf_terrains:pyramid_sloped_terrain
            proportion: 0.166
            size:
            - 10.0
            - 10.0
            flat_patch_sampling: null
            border_width: 0.0
            horizontal_scale: 0.1
            vertical_scale: 0.005
            slope_threshold: null
            slope_range:
            - 0.0
            - 0.3
            platform_width: 0.1
            inverted: false
          flat:
            function: isaaclab.terrains.trimesh.mesh_terrains:flat_terrain
            proportion: 0.166
            size:
            - 10.0
            - 10.0
            flat_patch_sampling: null
          pyramid_stairs_inv:
            function: isaaclab.terrains.trimesh.mesh_terrains:inverted_pyramid_stairs_terrain
            proportion: 0.17
            size:
            - 10.0
            - 10.0
            flat_patch_sampling: null
            border_width: 0.0
            step_height_range:
            - 0.05
            - 0.1
            step_width: 0.3
            platform_width: 0.1
            holes: false
        difficulty_range:
        - 0.0
        - 1.0
        use_cache: false
        cache_dir: /tmp/isaaclab/terrains
      usd_path: null
      env_spacing: null
      use_terrain_origins: true
      visual_material:
        func: isaaclab.sim.spawners.materials.visual_materials:spawn_from_mdl_file
        mdl_path: https://omniverse-content-production.s3-us-west-2.amazonaws.com/Assets/Isaac/5.1/Isaac/IsaacLab/Materials/TilesMarbleSpiderWhiteBrickBondHoned/TilesMarbleSpiderWhiteBrickBondHoned.mdl
        project_uvw: true
        albedo_brightness: null
        texture_scale:
        - 0.25
        - 0.25
      physics_material:
        func: isaaclab.sim.spawners.materials.physics_materials:spawn_rigid_body_material
        static_friction: 1.0
        dynamic_friction: 1.0
        restitution: 0.0
        friction_combine_mode: multiply
        restitution_combine_mode: multiply
        compliant_contact_stiffness: 0.0
        compliant_contact_damping: 0.0
      max_init_terrain_level: 0
      debug_vis: false
  events:
    push_robot:
      func: isaaclab.envs.mdp.events:push_by_setting_velocity
      params:
        velocity_range:
          x:
          - -0.5
          - 0.5
          'y':
          - -0.5
          - 0.5
        asset_cfg:
          name: robot
          joint_names: null
          joint_ids: slice(None,None,None)
          fixed_tendon_names: null
          fixed_tendon_ids: slice(None,None,None)
          body_names: null
          body_ids: slice(None,None,None)
          object_collection_names: null
          object_collection_ids: slice(None,None,None)
          preserve_order: false
      mode: interval
      interval_range_s:
      - 10.0
      - 15.0
      is_global_time: false
      min_step_count_between_reset: 0
  observation_space: '{"type": "python", "space": "Box", "value": 236}'
  num_observations: null
  state_space: '{"type": "python", "space": "Box", "value": 0}'
  num_states: null
  observation_noise_model: null
  action_space: '{"type": "python", "space": "Box", "value": 12}'
  num_actions: null
  action_noise_model: null
  rerender_on_reset: false
  num_rerenders_on_reset: 0
  wait_for_textures: true
  xr: null
  log_dir: null
  robot:
    class_type: isaaclab.assets.articulation.articulation:Articulation
    prim_path: /World/envs/env_.*/Robot
    spawn:
      func: isaaclab.sim.spawners.from_files.from_files:spawn_from_usd
      visible: true
      semantic_tags: null
      copy_from_source: true
      mass_props: null
      deformable_props: null
      rigid_props:
        rigid_body_enabled: null
        kinematic_enabled: null
        disable_gravity: false
        linear_damping: 0.0
        angular_damping: 0.0
        max_linear_velocity: 1000.0
        max_angular_velocity: 1000.0
        max_depenetration_velocity: 1.0
        max_contact_impulse: null
        enable_gyroscopic_forces: null
        retain_accelerations: false
        solver_position_iteration_count: null
        solver_velocity_iteration_count: null
        sleep_threshold: null
        stabilization_threshold: null
      collision_props: null
      activate_contact_sensors: true
      scale: null
      articulation_props:
        articulation_enabled: null
        enabled_self_collisions: false
        solver_position_iteration_count: 4
        solver_velocity_iteration_count: 0
        sleep_threshold: null
        stabilization_threshold: null
        fix_root_link: null
      fixed_tendons_props: null
      spatial_tendons_props: null
      joint_drive_props: null
      visual_material_path: material
      visual_material: null
      usd_path: https://omniverse-content-production.s3-us-west-2.amazonaws.com/Assets/Isaac/5.1/Isaac/IsaacLab/Robots/Unitree/A1/a1.usd
      variants: null
    init_state:
      pos:
      - 0.0
      - 0.0
      - 0.42
      rot:
      - 1.0
      - 0.0
      - 0.0
      - 0.0
      lin_vel:
      - 0.0
      - 0.0
      - 0.0
      ang_vel:
      - 0.0
      - 0.0
      - 0.0
      joint_pos:
        .*L_hip_joint: 0.1
        .*R_hip_joint: -0.1
        F[L,R]_thigh_joint: 0.8
        R[L,R]_thigh_joint: 1.0
        .*_calf_joint: -1.5
      joint_vel:
        .*: 0.0
    collision_group: 0
    debug_vis: false
    articulation_root_prim_path: null
    soft_joint_pos_limit_factor: 0.9
    actuators:
      base_legs:
        class_type: isaaclab.actuators.actuator_net:ActuatorNetMLP
        joint_names_expr:
        - .*_hip_joint
        - .*_thigh_joint
        - .*_calf_joint
        effort_limit: 23.7
        velocity_limit: 30.0
        effort_limit_sim: null
        velocity_limit_sim: null
        stiffness: null
        damping: null
        armature: null
        friction: null
        dynamic_friction: null
        viscous_friction: null
        saturation_effort: 23.7
        network_file: https://omniverse-content-production.s3-us-west-2.amazonaws.com/Assets/Isaac/5.1/Isaac/IsaacLab/ActuatorNets/Unitree/unitree_go1.pt
        pos_scale: -1.0
        vel_scale: 1.0
        torque_scale: 1.0
        input_order: pos_vel
        input_idx:
        - 0
        - 1
        - 2
    actuator_value_resolution_debug_print: false
  contact_sensor:
    class_type: isaaclab.sensors.contact_sensor.contact_sensor:ContactSensor
    prim_path: /World/envs/env_.*/Robot/.*_foot
    update_period: 0.0
    history_length: 3
    debug_vis: false
    track_pose: false
    track_contact_points: false
    track_friction_forces: false
    max_contact_data_count_per_prim: 4
    track_air_time: false
    force_threshold: 1.0
    filter_prim_paths_expr: []
    visualizer_cfg:
      prim_path: /Visuals/ContactSensor
      markers:
        contact:
          func: isaaclab.sim.spawners.shapes.shapes:spawn_sphere
          visible: true
          semantic_tags: null
          copy_from_source: true
          mass_props: null
          rigid_props: null
          collision_props: null
          activate_contact_sensors: false
          visual_material_path: material
          visual_material:
            func: isaaclab.sim.spawners.materials.visual_materials:spawn_preview_surface
            diffuse_color:
            - 1.0
            - 0.0
            - 0.0
            emissive_color:
            - 0.0
            - 0.0
            - 0.0
            roughness: 0.5
            metallic: 0.0
            opacity: 1.0
          physics_material_path: material
          physics_material: null
          radius: 0.02
        no_contact:
          func: isaaclab.sim.spawners.shapes.shapes:spawn_sphere
          visible: false
          semantic_tags: null
          copy_from_source: true
          mass_props: null
          rigid_props: null
          collision_props: null
          activate_contact_sensors: false
          visual_material_path: material
          visual_material:
            func: isaaclab.sim.spawners.materials.visual_materials:spawn_preview_surface
            diffuse_color:
            - 0.0
            - 1.0
            - 0.0
            emissive_color:
            - 0.0
            - 0.0
            - 0.0
            roughness: 0.5
            metallic: 0.0
            opacity: 1.0
          physics_material_path: material
          physics_material: null
          radius: 0.02
  action_scale: 0.25
  debug_vis: true
  spawn_height: 0.4
  observation_noise_scale: 0.05
  joint_friction_range:
  - 0.03
  - 0.3
  joint_damping_range:
  - 0.01
  - 0.1
  rew_scale_alive: 1.0
  rew_scale_track_lin_vel_xy_exp: 1.5
  rew_scale_track_ang_vel_z_exp: 0.75
  rew_scale_lin_vel_z_l2: -2.0
  rew_scale_ang_vel_xy_l2: -0.05
  rew_scale_dof_pos_l2: -0.2
  rew_scale_dof_torques_l2: -0.0002
  rew_scale_dof_acc_l2: -2.5e-07
  rew_scale_action_rate_l2: -0.01
  rew_scale_feet_air_time: 0.01
  rew_scale_flat_orientation_l2: -5.0
  rew_scale_foot_height_exp: 0.2
  rew_scale_feet_air_penalty: -0.05
  rew_scale_feet_air_penalty_static: -5.0
  rew_scale_joint_vel_l2_static: -0.1
  target_foot_height: 0.1
  command_lin_vel_std: 0.5
  command_ang_vel_std: 0.5
  command_x_range:
  - -1.0
  - 1.0
  command_y_range:
  - -1.0
  - 1.0
  command_yaw_range:
  - -1.0
  - 1.0
  command_resampling_time: 10.0
  base_angle_termination_thresh: 0.7
agent:
  seed: 42
  models:
    separate: false
    policy:
      class: GaussianMixin
      clip_actions: false
      clip_log_std: true
      min_log_std: -20.0
      max_log_std: 2.0
      initial_log_std: 0.0
      network:
      - name: net
        input: OBSERVATIONS
        layers:
        - 512
        - 256
        - 128
        activations: elu
      output: ACTIONS
    value:
      class: DeterministicMixin
      clip_actions: false
      network:
      - name: net
        input: OBSERVATIONS
        layers:
        - 512
        - 256
        - 128
        activations: elu
      output: ONE
  memory:
    class: RandomMemory
    memory_size: -1
  agent:
    class: PPO
    rollouts: 32
    learning_epochs: 8
    mini_batches: 8
    discount_factor: 0.99
    lambda: 0.95
    learning_rate: 0.0005
    learning_rate_scheduler: KLAdaptiveLR
    learning_rate_scheduler_kwargs:
      kl_threshold: 0.008
    state_preprocessor: RunningStandardScaler
    state_preprocessor_kwargs: null
    value_preprocessor: RunningStandardScaler
    value_preprocessor_kwargs: null
    random_timesteps: 0
    learning_starts: 0
    grad_norm_clip: 1.0
    ratio_clip: 0.2
    value_clip: 0.2
    clip_predicted_values: true
    entropy_loss_scale: 0.0
    value_loss_scale: 2.0
    kl_threshold: 0.0
    rewards_shaper_scale: 0.1
    time_limit_bootstrap: false
    experiment:
      directory: quadruped_direct
      experiment_name: ''
      write_interval: auto
      checkpoint_interval: auto
  trainer:
    class: SequentialTrainer
    timesteps: 1000000
    environment_info: log
