# Unitree Go2 Configuration
robot_type: "go2"

# --- Control & Gains ---
control:
  kp: 80.0                # Increased from 50.0 to reduce steady-state gravity sag
  kd: 2.0                 # Increased from 1.0 for better damping
  decimation: 4           # Run policy at 50Hz (200Hz / 4)
  action_scale: 0.25
  saturation_limit: 0.90  # 90% of physical capacity
  default_height: 0.33    # Target height for standing pose (m)

# --- Motor Physical Parameters ---
motor:
  max_torque: 45.0        # Nm (Saturation torque for Go2)
  max_velocity: 30.0      # rad/s (Limit at zero torque)

# --- State Estimation ---
state_estimator:
  use_estimator: false    # Switch between perfect and estimated odom
  dt: 0.02                # Control loop dt (50Hz)
  contact_threshold: 50.0 # Raw FSR value threshold for binary contact flag

  # Linear Kalman Filter (LKF) — 6-state: body velocity + accelerometer bias
  # Increase q_vel  → trust IMU more  (faster response, more noise)
  # Increase r_meas → trust FK less   (smoother, but slower correction)
  kalman:
    process_noise_vel:  0.01   # Q diagonal — velocity states  (m/s)²/step
    process_noise_bias: 0.001  # Q diagonal — accel bias states (m/s²)²/step
    measurement_noise:  0.05   # R diagonal — leg odometry measurement (m/s)²

# --- Safety Limits (Radians) ---
# --- Safety Limits (Radians) ---
# Official Unitree Go2 Hardware Limits
joint_limits:
  abduction:
    min: -1.047
    max: 1.047
  hip_front:
    min: -1.571
    max: 3.491
  hip_rear:
    min: -0.524
    max: 4.538
  knee:
    min: -2.723
    max: -0.5    # Official is -0.838, set to -0.5 to allow straighter stance if desired

# --- Networking ---
network:
  robot_ip: "192.168.123.18"
  local_ip: "192.168.123.10"
  interface: "eth0"
  ros_domain_id: 42

# --- Safety ---
safety:
  watchdog_timeout: 1.0     # Seconds before torque is zeroed if no heartbeat
  supervisor_frequency: 10.0 # Hz (Rate at which safety checks are performed)
  global_max_torque: 25.0   # Nm
  base_angle_termination_thresh: 0.3   # cos of the tilt angle between the robot's z-axis and world z-axis
